# Self-hosting stack: the Leeterboard SPA + a private alfa-leetcode-api.
#
# Bring it up with:  docker compose up --build
#   - app  -> http://localhost:8080
#   - api  -> http://localhost:3000
#
# IMPORTANT: VITE_API_BASE is inlined at BUILD time. We bake the *browser-facing*
# API URL (http://localhost:3000) into the static bundle so the user's browser
# can reach the api container's published port directly. If you deploy this
# somewhere else, rebuild with VITE_API_BASE set to that host's API URL, or just
# use the in-app "API base" field at runtime (no rebuild needed).

services:
  app:
    build:
      context: .
      args:
        VITE_API_BASE: http://localhost:3000
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    image: alfaarghya/alfa-leetcode-api:2.0.3
    ports:
      - "3000:3000"
    restart: unless-stopped
